version: "2"
run:
  tests: true
linters:
  enable:
    - dupl
    - gocyclo
    - misspell
    - unconvert
  settings:
    gocyclo:
      min-complexity: 15
    misspell:
      locale: US
    dupl:
      threshold: 100
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
