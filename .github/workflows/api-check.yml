name: API Compatibility Check

on:
  pull_request:
  schedule:
    - cron: "0 7 * * 1"  # Monday 7am UTC
  workflow_dispatch:

jobs:
  api-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build check
        run: go build ./cmd/server

      - name: API compat tests (Lidarr + SpotiFLAC upstream match)
        run: go test -tags apicompat -v ./tests/apicompat/

      - name: Validate OpenAPI spec
        run: |
          python3 -c "
import json
with open('openapi.json') as f:
    spec = json.load(f)

paths = spec.get('paths', {})
schemas = spec.get('components', {}).get('schemas', {})

required_paths = ['/api', '/api/newznab', '/api/sabnzbd', '/health']
for p in required_paths:
    assert p in paths, f'Missing path: {p}'

required_schemas = [
    'VersionResponse', 'QueueResponse', 'Queue', 'Slot',
    'HistoryResponse', 'History', 'HistorySlot',
    'ConfigResponse', 'Config', 'Category', 'Misc',
    'StatusResponse', 'AddURLResponse', 'FullStatusResponse',
    'ServerStatsResponse', 'WarningsResponse', 'RetryResponse',
    'NewznabRSS',
]
for s in required_schemas:
    assert s in schemas, f'Missing schema: {s}'

print(f'OpenAPI spec valid: {len(paths)} paths, {len(schemas)} schemas, {len(required_schemas)} required schemas OK')
"
