name: Upstream Sync

on:
  schedule:
    - cron: "13 7 * * *"  # daily 7:13am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-lidarr-sabnzbd-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Lidarr SABnzbd client source
        run: |
          curl -sL -o /tmp/Sabnzbd.cs \
            https://raw.githubusercontent.com/Lidarr/Lidarr/develop/src/NzbDrone.Core/Download/Clients/Sabnzbd/Sabnzbd.cs
          echo "Fetched Lidarr Sabnzbd.cs ($(wc -l < /tmp/Sabnzbd.cs) lines)"

      - name: Check required API endpoints
        run: |
          echo "=== Checking Lidarr SABnzbd API requirements ==="
          echo "--- API modes used ---"
          grep -oP 'mode=\w+' /tmp/Sabnzbd.cs | sort -u || true
          grep -oP '"mode",\s*"\w+"' /tmp/Sabnzbd.cs | sort -u || true
          echo "--- Our handler supports these modes ---"
          grep -oP '"\w+":\s*h\.handle' internal/api/sabnzbd/handler.go | sort -u || true
          echo "Review output above for any new/removed API modes Lidarr's client uses."

  sync-spotiflac-fork:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare pinned commit against fork HEAD
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PINNED=$(grep -oP 'SPOTIFLAC_COMMIT=\K[0-9a-f]{40}' Dockerfile)
          UPSTREAM_LATEST=$(gh api /repos/spotbye/SpotiFLAC/releases/latest -q '.tag_name // "unknown"' 2>/dev/null || echo unknown)
          FORK_DEFAULT_BRANCH=$(gh api /repos/fishingpvalues/SpotiFLAC -q '.default_branch')
          FORK_HEAD=$(gh api "/repos/fishingpvalues/SpotiFLAC/commits/${FORK_DEFAULT_BRANCH}" -q '.sha')

          {
            echo "pinned=$PINNED"
            echo "fork_head=$FORK_HEAD"
            echo "upstream_latest=$UPSTREAM_LATEST"
          } >> "$GITHUB_OUTPUT"

          if [ "$PINNED" = "$FORK_HEAD" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Already pinned to fork HEAD ($PINNED). Nothing to sync."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "Fork HEAD ($FORK_HEAD) is ahead of pinned commit ($PINNED)."
          fi

      - name: Check for an already-open sync PR
        if: steps.check.outputs.up_to_date == 'false'
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --head upstream-sync/spotiflac --state open --json number --jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        if: steps.check.outputs.up_to_date == 'false' && steps.existing_pr.outputs.count == '0'
        with:
          go-version-file: go.mod

      - name: Bump pinned SpotiFLAC commit
        if: steps.check.outputs.up_to_date == 'false' && steps.existing_pr.outputs.count == '0'
        run: |
          sed -i "s/SPOTIFLAC_COMMIT=[0-9a-f]\{40\}/SPOTIFLAC_COMMIT=${{ steps.check.outputs.fork_head }}/" Dockerfile
          grep SPOTIFLAC_COMMIT Dockerfile

      - name: Build and unit test against the new pin
        if: steps.check.outputs.up_to_date == 'false' && steps.existing_pr.outputs.count == '0'
        run: |
          go build ./...
          go test ./... -count=1

      - name: Integration test against the new pin (real Lidarr + rebuilt image)
        if: steps.check.outputs.up_to_date == 'false' && steps.existing_pr.outputs.count == '0'
        run: |
          docker compose up -d --build
          for url in http://localhost:8484/health http://localhost:8686/ping; do
            for i in $(seq 1 60); do
              curl -sf "$url" >/dev/null && break
              if [ "$i" -eq 60 ]; then echo "::error::$url never became ready"; docker compose logs; exit 1; fi
              sleep 2
            done
          done
          INTEGRATION=1 go test ./tests/integration/... -v -count=1
          docker compose down -v

      - name: Open PR for review
        if: steps.check.outputs.up_to_date == 'false' && steps.existing_pr.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PINNED: ${{ steps.check.outputs.pinned }}
          FORK_HEAD: ${{ steps.check.outputs.fork_head }}
          UPSTREAM_LATEST: ${{ steps.check.outputs.upstream_latest }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="upstream-sync/spotiflac-${FORK_HEAD}"
          git checkout -b "$BRANCH"
          git add Dockerfile

          cat <<EOF > /tmp/commit-msg.txt
          chore(deps): sync pinned SpotiFLAC commit

          Fork HEAD moved from ${PINNED} to ${FORK_HEAD}.
          Build, unit tests, and the full docker-compose integration suite (real
          Lidarr :latest + the rebuilt proxy image) all passed against this commit
          before this PR was opened - see the workflow run for details.
          EOF
          git commit -F /tmp/commit-msg.txt
          git push origin "$BRANCH"

          cat <<EOF > /tmp/pr-body.md
          Automated sync: [fishingpvalues/SpotiFLAC](https://github.com/fishingpvalues/SpotiFLAC) fork HEAD moved from \`${PINNED}\` to \`${FORK_HEAD}\`.

          **All checks passed before this PR was opened:** \`go build\`, \`go test ./...\`, and the full docker-compose integration suite (real Lidarr \`:latest\` + the rebuilt proxy image, real download-client/indexer round-trip).

          Upstream (spotbye/SpotiFLAC) latest release tag: \`${UPSTREAM_LATEST}\`.

          Review the fork's commit range, then merge and cut the next version tag when ready - this PR does not do that automatically.
          EOF
          gh pr create \
            --title "chore(deps): sync pinned SpotiFLAC commit to ${FORK_HEAD}" \
            --body-file /tmp/pr-body.md \
            --label "automated,dependencies"
