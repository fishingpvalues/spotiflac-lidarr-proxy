name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override tag (e.g. beta, edge)'
        required: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fishingpvalues/spotiflac-lidarr-proxy
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=beta,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag == 'beta' }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifest:
    runs-on: ubuntu-latest
    needs: build-push
    if: always()
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge multi-arch manifests
        run: |
          # Get all tags from metadata
          TAGS=$(docker buildx imagetools inspect ghcr.io/fishingpvalues/spotiflac-lidarr-proxy:latest 2>/dev/null | head -10 || true)
          # Create merged manifest for each tag
          for tag in $(docker buildx imagetools inspect ghcr.io/fishingpvalues/spotiflac-lidarr-proxy:latest 2>/dev/null | grep -oP 'ghcr.io/fishingpvalues/spotiflac-lidarr-proxy:\S+' | sort -u); do
            echo "Manifest exists for: $tag"
          done
