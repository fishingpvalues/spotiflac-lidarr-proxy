name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Catches drift with no code change on our side: docker-compose.yml
    # pins Lidarr to :latest, so this re-runs the integration suite daily
    # against whatever Lidarr shipped, surfacing API breakage early.
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./cmd/server

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build multi-arch (dry-run)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create external network for integration
        run: docker network create potatostack_potatostack 2>/dev/null || true

      - name: Start proxy + Lidarr
        run: docker compose up -d --build

      - name: Wait for proxy and Lidarr to be ready
        run: |
          for url in http://localhost:8484/health http://localhost:8686/ping; do
            echo "Waiting for $url ..."
            for i in $(seq 1 60); do
              if curl -sf "$url" >/dev/null; then
                echo "$url is up"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "::error::$url never became ready"
                docker compose logs
                exit 1
              fi
              sleep 2
            done
          done

      - name: Run integration tests (real Lidarr, this exact compose stack)
        run: INTEGRATION=1 go test ./tests/integration/... -v -count=1

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
