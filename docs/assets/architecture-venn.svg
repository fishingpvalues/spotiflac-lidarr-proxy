<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" width="640" height="380" font-family="Helvetica, Arial, sans-serif">
  <rect width="640" height="380" fill="#0b1020"/>

  <!-- left circle: SpotiFLAC world, drawn with a slightly irregular hand-inked path -->
  <path d="M 210 190
           C 210 110, 130 60, 90 100
           C 40 145, 45 235, 100 275
           C 150 315, 220 270, 210 190 Z"
        fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- right circle: Lidarr / *arr world -->
  <path d="M 430 190
           C 430 105, 515 55, 555 100
           C 600 150, 590 240, 540 278
           C 485 318, 420 270, 430 190 Z"
        fill="none" stroke="#eab308" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- intersection wash -->
  <ellipse cx="320" cy="192" rx="70" ry="95" fill="#e2e8f0" opacity="0.06"/>

  <!-- labels -->
  <text x="110" y="55" fill="#22c55e" font-size="20" font-weight="600">SpotiFLAC</text>
  <text x="110" y="76" fill="#94a3b8" font-size="13">Tidal / Qobuz / Amazon / Deezer</text>
  <text x="110" y="93" fill="#94a3b8" font-size="13">FLAC ripper, no login required</text>

  <text x="430" y="55" fill="#eab308" font-size="20" font-weight="600" text-anchor="start">Lidarr</text>
  <text x="410" y="76" fill="#94a3b8" font-size="13">*arr ecosystem</text>
  <text x="405" y="93" fill="#94a3b8" font-size="13">SABnzbd + Newznab APIs</text>

  <!-- proxy sitting in the overlap -->
  <rect x="255" y="160" width="130" height="64" rx="10" fill="#0f172a" stroke="#e2e8f0" stroke-width="2"/>
  <text x="320" y="188" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">spotiflac-lidarr</text>
  <text x="320" y="206" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">-proxy</text>

  <text x="320" y="345" fill="#64748b" font-size="13" text-anchor="middle">
    A fork-and-bridge layer: speaks SpotiFLAC on one side, SABnzbd/Newznab on the other.
  </text>
  <text x="320" y="363" fill="#64748b" font-size="13" text-anchor="middle">
    Lidarr never knows it isn't talking to a real Usenet indexer and downloader.
  </text>
</svg>
