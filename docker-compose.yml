services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8484:8484"
    environment:
      - SPF_API_KEY=test-integration-key
      - SPF_OUTPUT_DIR=/downloads
      - SPF_DB_PATH=/data/queue.db
      - SPF_LOG_LEVEL=info
      - SPF_DEFAULT_SERVICE=tidal
      - SPF_DEFAULT_QUALITY=lossless
      - SPF_MAX_CONCURRENT=3
    volumes:
      - downloads:/downloads
      - data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8484/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    ports:
      - "8686:8686"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - downloads:/downloads
      - lidarr_config:/config
    restart: unless-stopped

volumes:
  downloads:
  data:
  lidarr_config:
